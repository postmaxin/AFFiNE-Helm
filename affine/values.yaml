global:
  app:
    buildType: 'stable'
    # set to 'dev', 'beta', or 'production'.
    # if not set, will use the name of the kubernetes namespace.
    environment: ''
    # if set, we will load AFFiNE's JSON config from this ConfigMap
    configMapName: ''
    # name of the key within `configMapKey` to load
    configMapKey: 'config'
  ingress:
    enabled: false
    className: ''
    # hosts for ingress rules
    # e.g.
    # hosts:
    #  - affine.pro
    #  - www.affine.pro
    hosts:
      - affine.pro
    tls: []
  secret:
    secretName: 'server-private-key'
    privateKey: ''
  database:
    # if "password" is set, this chart will store that password in a secret
    # that AFFiNE will use to connect.
    #
    # if you want to reuse an existing secret, leave 'password' blank
    # and change `secretName` (and optionally `secretPasswordField`).
    secretName: 'pg-postgresql'
    secretUsernameField: 'postgres-username'
    secretPasswordField: 'postgres-password'
    user: 'postgres'
    host: 'pg-postgresql'
    port: '5432'
    name: 'affine'
    password: ''
  redis:
    host: 'redis-master'
    port: '6379'
    username: ''
    password: ''
    database: 0
  indexer:
    enabled: true
    provider: ''
    endpoint: ''
    apiKey: ''
  docService:
    name: 'affine-doc'
    port: 3020
  deployment:
    # Maps to DEPLOYMENT_TYPE and DEPLOYMENT_PLATFORM environment variables.
    # 'selfhosted', 'affine', or 'unknown'
    type: 'selfhosted'
    # this is referenced in the AFFiNE source, defaulting to 'unknown', but
    # nothing seems to actually _use_ it.
    platform: 'unknown'

graphql:
  service:
    type: ClusterIP
    port: 3000
    annotations:
      cloud.google.com/backend-config: '{"default": "affine-api-backendconfig"}'

front:
  services:
    sync:
      name: affine-sync
      type: ClusterIP
      port: 3010
      annotations:
        cloud.google.com/backend-config: '{"default": "affine-api-backendconfig"}'
    renderer:
      name: affine-renderer
      type: ClusterIP
      port: 3000
      annotations:
        cloud.google.com/backend-config: '{"default": "affine-api-backendconfig"}'
    web:
      name: affine-web
      type: ClusterIP
      port: 8080
    doc:
      type: ClusterIP
      annotations:
        cloud.google.com/backend-config: '{"default": "affine-api-backendconfig"}'
